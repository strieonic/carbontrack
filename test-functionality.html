<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarbonTrack - Functionality Test</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            max-width: 1200px;
            margin: 20px auto;
            padding: 20px;
            background: #0a0e1a;
            color: #e0e0e0;
        }
        h1 { color: #48c78e; }
        .test-section {
            background: #1a1f2e;
            border: 1px solid #2a3f4e;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
        }
        .test-item {
            padding: 10px;
            margin: 5px 0;
            border-left: 3px solid #48c78e;
            background: #0f1419;
        }
        .error { border-left-color: #ef4444; }
        .warning { border-left-color: #f59e0b; }
        .success { border-left-color: #48c78e; }
        button {
            background: #48c78e;
            color: #0a0e1a;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            margin: 5px;
        }
        button:hover { background: #3dd9b3; }
        pre {
            background: #0f1419;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
        }
        .status { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.85rem; margin-left: 10px; }
        .status.pass { background: #48c78e; color: #0a0e1a; }
        .status.fail { background: #ef4444; color: white; }
        .status.warn { background: #f59e0b; color: #0a0e1a; }
    </style>
</head>
<body>
    <h1>🧪 CarbonTrack Functionality Test</h1>
    
    <div class="test-section">
        <h2>1. Module Loading Tests</h2>
        <button onclick="testModules()">Run Module Tests</button>
        <div id="moduleResults"></div>
    </div>

    <div class="test-section">
        <h2>2. Carbon Calculation Test</h2>
        <button onclick="testCalculation()">Test Calculation Engine</button>
        <div id="calcResults"></div>
    </div>

    <div class="test-section">
        <h2>3. Database Connection Test</h2>
        <button onclick="testDatabase()">Test Supabase Connection</button>
        <div id="dbResults"></div>
    </div>

    <div class="test-section">
        <h2>4. Device ID Test</h2>
        <button onclick="testDeviceID()">Test Device Identification</button>
        <div id="deviceResults"></div>
    </div>

    <div class="test-section">
        <h2>5. Page Navigation Test</h2>
        <button onclick="testPages()">Test All Pages</button>
        <div id="pageResults"></div>
    </div>

    <script type="module">
        import { calculateCarbon, getCarbonRating } from './js/carbon.js';
        import { saveEntry, fetchLatest } from './js/db.js';
        import deviceID from './js/device.js';
        import supabase from './js/supabase.js';

        window.testModules = async function() {
            const results = document.getElementById('moduleResults');
            results.innerHTML = '<p>Testing module imports...</p>';
            
            let html = '';
            
            // Test carbon module
            try {
                if (typeof calculateCarbon === 'function') {
                    html += '<div class="test-item success">✅ carbon.js loaded successfully</div>';
                } else {
                    html += '<div class="test-item error">❌ carbon.js function not found</div>';
                }
            } catch (e) {
                html += `<div class="test-item error">❌ carbon.js error: ${e.message}</div>`;
            }

            // Test db module
            try {
                if (typeof saveEntry === 'function' && typeof fetchLatest === 'function') {
                    html += '<div class="test-item success">✅ db.js loaded successfully</div>';
                } else {
                    html += '<div class="test-item error">❌ db.js functions not found</div>';
                }
            } catch (e) {
                html += `<div class="test-item error">❌ db.js error: ${e.message}</div>`;
            }

            // Test device module
            try {
                if (deviceID && deviceID.length > 0) {
                    html += `<div class="test-item success">✅ device.js loaded - ID: ${deviceID.substring(0, 8)}...</div>`;
                } else {
                    html += '<div class="test-item error">❌ device.js - no ID generated</div>';
                }
            } catch (e) {
                html += `<div class="test-item error">❌ device.js error: ${e.message}</div>`;
            }

            // Test supabase module
            try {
                if (supabase && supabase.from) {
                    html += '<div class="test-item success">✅ supabase.js loaded successfully</div>';
                } else {
                    html += '<div class="test-item error">❌ supabase.js client not initialized</div>';
                }
            } catch (e) {
                html += `<div class="test-item error">❌ supabase.js error: ${e.message}</div>`;
            }

            results.innerHTML = html;
        };

        window.testCalculation = function() {
            const results = document.getElementById('calcResults');
            results.innerHTML = '<p>Testing calculation engine...</p>';
            
            try {
                const testData = {
                    electricityBill: 1600,
                    petrolKm: 100,
                    dieselKm: 0,
                    publicKm: 50,
                    evKm: 0,
                    lpgCylinders: 1,
                    pngUsage: 0,
                    inductionHours: 1,
                    acHours: 3,
                    hasRefrigerator: true,
                    washingUses: 3,
                    laptopHours: 6,
                    tvHours: 3,
                    wasteKgPerDay: 0.5,
                    hasSegregation: false,
                    people: 3
                };

                const result = calculateCarbon(testData);
                
                let html = '<div class="test-item success">✅ Calculation completed successfully</div>';
                html += `<pre>${JSON.stringify(result, null, 2)}</pre>`;
                
                // Validate results
                if (result.totalCO2 > 0) {
                    html += '<div class="test-item success">✅ Total CO₂ calculated correctly</div>';
                } else {
                    html += '<div class="test-item error">❌ Total CO₂ is zero or negative</div>';
                }

                if (result.rating && result.rating.grade) {
                    html += `<div class="test-item success">✅ Rating generated: ${result.rating.grade} (${result.rating.label})</div>`;
                } else {
                    html += '<div class="test-item error">❌ Rating not generated</div>';
                }

                if (result.treesNeeded > 0) {
                    html += `<div class="test-item success">✅ Trees needed: ${result.treesNeeded}</div>`;
                } else {
                    html += '<div class="test-item error">❌ Trees calculation failed</div>';
                }

                results.innerHTML = html;
            } catch (e) {
                results.innerHTML = `<div class="test-item error">❌ Calculation error: ${e.message}</div><pre>${e.stack}</pre>`;
            }
        };

        window.testDatabase = async function() {
            const results = document.getElementById('dbResults');
            results.innerHTML = '<p>Testing database connection...</p>';
            
            try {
                // Test connection
                const { data, error } = await supabase.from('carbon_entries').select('count').limit(1);
                
                if (error) {
                    if (error.message.includes('JWT')) {
                        results.innerHTML = `
                            <div class="test-item warning">⚠️ Supabase key needs to be updated</div>
                            <div class="test-item">
                                <p>Current key is a placeholder. To fix:</p>
                                <ol>
                                    <li>Go to <a href="https://supabase.com/dashboard/project/truoxyqyzuygobiendjy/settings/api" target="_blank" style="color: #48c78e;">Supabase API Settings</a></li>
                                    <li>Copy the "anon" public key</li>
                                    <li>Replace SUPABASE_KEY in js/supabase.js</li>
                                </ol>
                            </div>
                        `;
                    } else if (error.message.includes('relation') || error.message.includes('does not exist')) {
                        results.innerHTML = `
                            <div class="test-item warning">⚠️ Database table not created</div>
                            <div class="test-item">
                                <p>Run the SQL from README.md in Supabase SQL editor</p>
                            </div>
                        `;
                    } else {
                        results.innerHTML = `<div class="test-item error">❌ Database error: ${error.message}</div>`;
                    }
                } else {
                    results.innerHTML = '<div class="test-item success">✅ Database connection successful!</div>';
                }
            } catch (e) {
                results.innerHTML = `<div class="test-item error">❌ Connection error: ${e.message}</div>`;
            }
        };

        window.testDeviceID = function() {
            const results = document.getElementById('deviceResults');
            
            try {
                const storedID = localStorage.getItem('ct_device_id');
                
                let html = '';
                if (storedID) {
                    html += `<div class="test-item success">✅ Device ID exists: ${storedID}</div>`;
                    html += `<div class="test-item">ID Length: ${storedID.length} characters</div>`;
                    
                    if (deviceID === storedID) {
                        html += '<div class="test-item success">✅ Module ID matches localStorage</div>';
                    } else {
                        html += '<div class="test-item warning">⚠️ Module ID differs from localStorage</div>';
                    }
                } else {
                    html += '<div class="test-item error">❌ No device ID in localStorage</div>';
                }

                results.innerHTML = html;
            } catch (e) {
                results.innerHTML = `<div class="test-item error">❌ Error: ${e.message}</div>`;
            }
        };

        window.testPages = function() {
            const results = document.getElementById('pageResults');
            const pages = [
                { name: 'Home', url: 'index.html' },
                { name: 'Survey', url: 'pages/survey.html' },
                { name: 'Dashboard', url: 'pages/dashboard.html' },
                { name: 'Comparison', url: 'pages/comparison.html' },
                { name: 'Suggestions', url: 'pages/suggestions.html' },
                { name: 'Impact', url: 'pages/impact.html' }
            ];

            let html = '<p>Testing page accessibility...</p>';
            
            pages.forEach(page => {
                html += `<div class="test-item">
                    <a href="${page.url}" target="_blank" style="color: #48c78e;">${page.name}</a> - 
                    <a href="${page.url}" target="_blank" style="color: #38bdf8;">Open in new tab</a>
                </div>`;
            });

            html += '<div class="test-item success">✅ All page links generated. Click to test manually.</div>';
            results.innerHTML = html;
        };

        // Auto-run basic tests on load
        window.addEventListener('load', () => {
            setTimeout(() => {
                testModules();
                testDeviceID();
            }, 500);
        });
    </script>
</body>
</html>
